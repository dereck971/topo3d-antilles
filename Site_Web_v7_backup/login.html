<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Topo3D-Antilles 🏔️</title>
    <meta name="description" content="Connexion à la plateforme Topo3D-Antilles pour accéder à vos données topographiques 3D LiDAR">
    <meta name="theme-color" content="#0a0a14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🏔️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a14;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/hero-topo3d.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00c896;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid rgba(0, 200, 150, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 48px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 200, 150, 0.4);
            box-shadow: 0 0 12px rgba(0, 200, 150, 0.1);
        }

        input::placeholder {
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px 14px;
            background: #00c896;
            color: #0a0a14;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #00d4aa;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 200, 150, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6464;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: rgba(0, 200, 150, 0.1);
            border: 1px solid rgba(0, 200, 150, 0.3);
            color: #00c896;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            margin-left: 4px;
            animation: blink 1.4s infinite;
        }

        @keyframes blink {
            0%, 20%, 50%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
            60% { opacity: 0.7; }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }

        .footer a {
            color: #00c896;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #00d4aa;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #00c896;
            color: #0a0a14;
            padding: 8px 16px;
            z-index: 10000;
            font-weight: 600;
            text-decoration: none;
            transition: top 0.3s;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>
<body>
    <a href="#loginForm" class="skip-link">Aller au formulaire</a>
    <div class="background"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card">
            <div class="logo">🏔️</div>
            <h1>Topo3D-Antilles</h1>
            <p class="subtitle">Connexion - Bêta Pro</p>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="user">Identifiant</label>
                    <input
                        type="text"
                        id="user"
                        name="user"
                        placeholder="Entrez votre identifiant"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="pass">Mot de passe</label>
                    <input
                        type="password"
                        id="pass"
                        name="pass"
                        placeholder="Entrez votre mot de passe"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" id="submitBtn">
                    Se connecter
                </button>
            </form>

            <div class="footer">
                <p>Version bêta - contact@topo3d-antilles.com</p>
            </div>
        </div>
    </div>

    <script>
        // Particles animation
        const particlesContainer = document.getElementById('particles');
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-10px';
            particle.style.animationDuration = (4 + Math.random() * 4) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particlesContainer.appendChild(particle);

            setTimeout(() => particle.remove(), 8000);
        }

        setInterval(createParticle, 300);

        // Login form handler
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        const userInput = document.getElementById('user');
        const passInput = document.getElementById('pass');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = 'Connexion en cours<span class="loading"></span>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user: userInput.value,
                        pass: passInput.value,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Connexion réussie ! Redirection...';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '/carte.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Erreur lors de la connexion';
                    errorDiv.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (err) {
                errorDiv.textContent = 'Erreur réseau. Veuillez réessayer.';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Auto-focus on user field
        document.addEventListener('DOMContentLoaded', () => {
            userInput.focus();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topo3D Guadeloupe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;display:flex;align-items:center;padding:0 6vw}
.ht{max-width:500px;pointer-events:auto}
.badge{display:inline-block;padding:5px 14px;border-radius:20px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);font-size:11px;font-weight:600;color:#00d4aa;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(30px,5vw,52px);font-weight:900;color:#e8e8ee;line-height:1.1;margin-bottom:16px}
h1 em{font-style:normal;background:linear-gradient(135deg,#00d4aa,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{font-size:15px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:28px;max-width:420px}
.cta{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border-radius:12px;background:linear-gradient(135deg,#00d4aa,#00a88a);color:#000;font-size:15px;font-weight:700;text-decoration:none;transition:.3s}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,170,.3)}
.sub{display:block;margin-top:10px;font-size:12px;color:rgba(255,255,255,.3)}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ov">
<div class="ht">
    <div class="badge">Service pour les pros du BTP en Guadeloupe</div>
    <h1>La topographie 3D de <em>n'importe quelle parcelle</em></h1>
    <p class="desc">Fichiers OBJ + DXF exploitables en quelques minutes. Données IGN haute résolution. Importez dans SketchUp, AutoCAD, Revit.</p>
    <a href="carte.html" class="cta">Accéder à la carte 3D →</a>
    <span class="sub">Gratuit en aperçu · Fichiers pro à partir de 49€</span>
</div>
</div>

<!-- Three.js via CDN classique (PAS de module ES — fonctionne en file:// et partout) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── RENDERER ───
var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x0a0a14);

var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0a14,0.005);

var camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,0.1,600);
camera.position.set(50,32,55);
camera.lookAt(-3,4,-2);

// ─── LIGHTS ───
scene.add(new THREE.AmbientLight(0xe0ddd8,0.8));
var sun=new THREE.DirectionalLight(0xfffaf0,1.3);
sun.position.set(25,50,15);
scene.add(sun);
var fill=new THREE.DirectionalLight(0x8899bb,0.3);
fill.position.set(-20,12,-25);
scene.add(fill);

// ═══════════════════════════════════
// GUADELOUPE TERRAIN
// ═══════════════════════════════════
var W=70,D=60,NX=200,NZ=170;
var EX=3.2;

function terrainH(nx,nz){
    var cx=nx-.5,cz=nz-.5;

    // Basse-Terre
    var bx=cx+.14,bz=cz+.02;
    var bD=Math.sqrt(bx*bx*2+bz*bz*4);
    var bM=Math.max(0,1-bD*2.6);
    var bS=bM*bM*(3-2*bM);

    // Soufrière
    var sx=cx+.11,sz=cz-.1;
    var sD=Math.sqrt(sx*sx*3+sz*sz*3);
    var souf=Math.max(0,1-sD*3.5)*13;

    // Ridge
    var rL=Math.exp(-Math.pow((cx+.13)*7,2));
    var rN=Math.max(0,1-Math.abs(cz+.02)*3.2);
    var ridge=rL*rN*7;

    // Peaks
    var p2x=cx+.15,p2z=cz+.14;
    var pk2=Math.max(0,1-Math.sqrt(p2x*p2x+p2z*p2z)*5.5)*5;
    var p3x=cx+.18,p3z=cz-.15;
    var pk3=Math.max(0,1-Math.sqrt(p3x*p3x+p3z*p3z)*6)*4;

    var bt=bS*3.5+ridge+souf+pk2+pk3;

    // Grande-Terre
    var gx=cx-.17,gz=cz+.03;
    var gD=Math.sqrt(gx*gx*2.5+gz*gz*4.5);
    var gM=Math.max(0,1-gD*2.5);
    var gt=gM*gM*(3-2*gM)*1.6;
    var gtH1=Math.max(0,1-Math.sqrt(Math.pow(cx-.22,2)+Math.pow(cz+.08,2))*8)*0.8;

    // Bridge
    var br=Math.exp(-Math.pow(cz*14,2))*Math.exp(-Math.pow(cx*3.5,2))*0.5;

    // Marie-Galante
    var mx2=cx-.07,mz2=cz-.31;
    var mD=Math.sqrt(mx2*mx2+mz2*mz2);
    var mg=Math.max(0,1-mD*9.5);
    var mgH=mg*mg*1.4;

    // Saintes
    var sax=cx+.07,saz=cz-.34;
    var saD=Math.sqrt(sax*sax+saz*saz);
    var sa=Math.max(0,1-saD*13)*2.2;
    var sa2x=cx+.12,sa2z=cz-.33;
    var sa2=Math.max(0,1-Math.sqrt(sa2x*sa2x+sa2z*sa2z)*16)*1.5;

    // Désirade
    var dx2=cx-.34,dz2=cz+.11;
    var dD=Math.sqrt(dx2*dx2*5+dz2*dz2*22);
    var des=Math.max(0,1-dD*4.5)*1.8;

    // Noise
    var n1=Math.sin(nx*28)*Math.cos(nz*24)*.25;
    var n2=Math.sin(nx*55+2)*Math.cos(nz*48+1)*.08;

    var elev=bt+gt+gtH1+br+mgH+sa+sa2+des;
    elev+=(n1+n2)*Math.min(1,elev*.4);
    return Math.max(0,elev*EX);
}

// Build geometry
var geo=new THREE.PlaneGeometry(W,D,NX,NZ);
geo.rotateX(-Math.PI/2);
var pos=geo.attributes.position;
for(var i=0;i<pos.count;i++){
    var x=pos.getX(i),z=pos.getZ(i);
    pos.setY(i,terrainH((x+W/2)/W,(z+D/2)/D));
}
pos.needsUpdate=true;
geo.computeVertexNormals();

// White terrain
var tMat=new THREE.MeshStandardMaterial({color:0xf2efea,roughness:0.92,metalness:0});
scene.add(new THREE.Mesh(geo,tMat));

// Subtle wireframe
var wMat=new THREE.MeshBasicMaterial({color:0xbbbbbb,wireframe:true,transparent:true,opacity:0.025});
var wire=new THREE.Mesh(geo.clone(),wMat);
wire.position.y=0.02;
scene.add(wire);

// ═══════════════════════════════════
// CONTOUR LINES
// ═══════════════════════════════════
var cGroup=new THREE.Group();
scene.add(cGroup);

(function(){
    var rows=NZ+1,cols=NX+1;
    var maxH=EX*14;

    for(var lv=0.8;lv<=maxH;lv+=1.2){
        var major=Math.abs(lv-Math.round(lv/5)*5)<0.7;
        var pts=[];

        for(var r=0;r<rows-1;r++){
            for(var c=0;c<cols-1;c++){
                var z00=pos.getY(r*cols+c),z10=pos.getY(r*cols+c+1);
                var z01=pos.getY((r+1)*cols+c),z11=pos.getY((r+1)*cols+c+1);
                var idx=((z00>=lv)?8:0)|((z10>=lv)?4:0)|((z11>=lv)?2:0)|((z01>=lv)?1:0);
                if(!idx||idx===15)continue;

                var lr=function(a,b){return(a===b)?.5:(lv-a)/(b-a)};
                var x0=pos.getX(r*cols+c),zz0=pos.getZ(r*cols+c);
                var dx=W/NX,dz=D/NZ;

                var T=[x0+dx*lr(z00,z10),lv,zz0];
                var Ri=[x0+dx,lv,zz0+dz*lr(z10,z11)];
                var B=[x0+dx*lr(z01,z11),lv,zz0+dz];
                var L=[x0,lv,zz0+dz*lr(z00,z01)];

                var sg=[];
                switch(idx){
                    case 1:case 14:sg.push([L,B]);break;
                    case 2:case 13:sg.push([B,Ri]);break;
                    case 3:case 12:sg.push([L,Ri]);break;
                    case 4:case 11:sg.push([T,Ri]);break;
                    case 5:sg.push([L,T],[B,Ri]);break;
                    case 6:case 9:sg.push([T,B]);break;
                    case 7:case 8:sg.push([L,T]);break;
                    case 10:sg.push([L,B],[T,Ri]);break;
                }
                for(var s=0;s<sg.length;s++){pts.push(sg[s][0][0],sg[s][0][1],sg[s][0][2],sg[s][1][0],sg[s][1][1],sg[s][1][2])}
            }
        }

        if(!pts.length)continue;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
        cGroup.add(new THREE.LineSegments(g,new THREE.LineBasicMaterial({
            color:major?0x999999:0xc8c8c8,
            transparent:true,
            opacity:major?0.18:0.06
        })));
    }
})();

// ─── OCEAN ───
var oGeo=new THREE.PlaneGeometry(500,500);
oGeo.rotateX(-Math.PI/2);
var ocean=new THREE.Mesh(oGeo,new THREE.MeshStandardMaterial({color:0x0c3550,transparent:true,opacity:0.92,roughness:0.15,metalness:0.45}));
ocean.position.y=-0.08;
scene.add(ocean);

// Shallow ring
var shGeo=new THREE.PlaneGeometry(110,90);
shGeo.rotateX(-Math.PI/2);
var shallow=new THREE.Mesh(shGeo,new THREE.MeshStandardMaterial({color:0x1a7a7a,transparent:true,opacity:0.2,roughness:0.3}));
shallow.position.y=0.01;
scene.add(shallow);

// Grid
var gr=new THREE.GridHelper(250,100,0x101825,0x101825);
gr.position.y=-0.15;
gr.material.transparent=true;
gr.material.opacity=0.06;
scene.add(gr);

// ─── PARTICLES ───
var PC=300;
var pGeo=new THREE.BufferGeometry();
var pP=new Float32Array(PC*3),pV=new Float32Array(PC*3);
for(var i=0;i<PC;i++){
    pP[i*3]=(Math.random()-.5)*110;
    pP[i*3+1]=Math.random()*28+2;
    pP[i*3+2]=(Math.random()-.5)*90;
    pV[i*3]=(Math.random()-.5)*.008;
    pV[i*3+1]=(Math.random()-.3)*.003;
    pV[i*3+2]=(Math.random()-.5)*.006;
}
pGeo.setAttribute('position',new THREE.Float32BufferAttribute(pP,3));
var particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x00d4aa,size:.06,transparent:true,opacity:.3}));
scene.add(particles);

// ─── ROTATION & ANIMATION ───
var angle=0;
var clock=new THREE.Clock();

function animate(){
    requestAnimationFrame(animate);
    var t=clock.getElapsedTime();

    // Auto-rotate camera around the island
    angle+=0.002;
    var radius=65;
    camera.position.x=Math.cos(angle)*radius;
    camera.position.z=Math.sin(angle)*radius;
    camera.position.y=30+Math.sin(t*0.1)*3;
    camera.lookAt(-3,5,-2);

    // Water
    ocean.position.y=-0.08+Math.sin(t*.35)*.025;

    // Particles
    var pp=particles.geometry.attributes.position;
    for(var i=0;i<PC;i++){
        pp.array[i*3]+=pV[i*3]+Math.sin(t*.2+i)*.001;
        pp.array[i*3+1]+=pV[i*3+1]+Math.cos(t*.15+i*.6)*.0008;
        pp.array[i*3+2]+=pV[i*3+2]+Math.sin(t*.18+i*.4)*.001;
        if(pp.array[i*3]>55)pp.array[i*3]=-55;
        if(pp.array[i*3]<-55)pp.array[i*3]=55;
        if(pp.array[i*3+1]>32)pp.array[i*3+1]=2;
        if(pp.array[i*3+2]>45)pp.array[i*3+2]=-45;
    }
    pp.needsUpdate=true;

    // Light
    sun.position.x=25+Math.sin(t*.06)*6;

    renderer.render(scene,camera);
}
animate();

// ─── RESIZE ───
window.addEventListener('resize',function(){
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
